<div class="create-course">
    <h3>Προφίλ χρήστη</h3>

     <form [formGroup]="form">

      <mat-form-field appearance="outline">
        <mat-label>Όνομα</mat-label>
        <input placeholder="Όνομα" matInput formControlName="name">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input placeholder="Email" matInput formControlName="email">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Κινητό τηλέφωνο</mat-label>
        <mat-icon matPrefix>phone</mat-icon>
        <input placeholder="6900000000" matInput formControlName="phoneNumber">
        <mat-error *ngIf="form.get('phoneNumber')?.hasError('pattern')">
          Μη έγκυρος αριθμός (π.χ. 6900000000)
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>ΑΦΜ</mat-label>
        <mat-icon matPrefix>badge</mat-icon>
        <input placeholder="123456789" matInput formControlName="vat">
        <mat-error *ngIf="form.get('vat')?.hasError('pattern')">
          Το ΑΦΜ πρέπει να αποτελείται από 9 ψηφία
        </mat-error>
      </mat-form-field>

      <mat-dialog-actions>
        <button mat-raised-button color="warn" (click)="close()">
          Ακύρωση
        </button>
        <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">
          Αποθήκευση
        </button>       
      </mat-dialog-actions>
    </form>
  </div>
