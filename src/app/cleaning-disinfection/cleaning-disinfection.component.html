<div class="page-container">

  <div class="page-hero">
    <mat-icon class="hero-icon">cleaning_services</mat-icon>
    <h1 class="hero-title">Έλεγχος καθαρισμού</h1>
  </div>

  <mat-card class="description-card">
    <mat-card-content>
      <p class="description-text">{{ descriptionText }}</p>
    </mat-card-content>
  </mat-card>

  <mat-card class="content-card">
    <mat-card-content>
      <mat-tab-group mat-align-tabs="center" (selectedTabChange)="tabChanged($event)">

        <mat-tab label="Έλεγχος καθαρισμού">

          <div class="tab-content">
            <mat-accordion class="example-headers-align" multi>
              <mat-expansion-panel>
                <mat-expansion-panel-header>
                  <mat-panel-description>
                    Εκτύπωση
                    <mat-icon>date_range</mat-icon>
                  </mat-panel-description>
                </mat-expansion-panel-header>

                <div class="date-row">
                  <mat-form-field appearance="outline">
                    <mat-label>Από</mat-label>
                    <input matInput [matDatepicker]="fromDatePicker" (dateInput)="setDateFrom($event)" readonly>
                    <mat-datepicker-toggle matSuffix [for]="fromDatePicker"></mat-datepicker-toggle>
                    <mat-datepicker #fromDatePicker></mat-datepicker>
                  </mat-form-field>

                  <mat-form-field appearance="outline">
                    <mat-label>Εως</mat-label>
                    <input matInput [matDatepicker]="toDatePicker" (dateInput)="setDateTo($event)" readonly>
                    <mat-datepicker-toggle matSuffix [for]="toDatePicker"></mat-datepicker-toggle>
                    <mat-datepicker #toDatePicker></mat-datepicker>
                  </mat-form-field>

                  <button mat-raised-button color="primary" (click)="export()">
                    <mat-icon>print</mat-icon> Εκτύπωση
                  </button>
                </div>
              </mat-expansion-panel>
            </mat-accordion>

            <div class="form-section">
              <form #myform="ngForm">
                <mat-form-field appearance="outline" class="date-field">
                  <mat-label>Ημερομηνία</mat-label>
                  <input matInput [matDatepicker]="promoStartPicker" [max]="maxDate" (dateInput)="getCleaningByDate($event)">
                  <mat-datepicker-toggle matSuffix [for]="promoStartPicker"></mat-datepicker-toggle>
                  <mat-datepicker #promoStartPicker></mat-datepicker>
                </mat-form-field>

                <mat-list role="list">
                  <section class="example-section">
                    <span class="example-list-section">
                      <ul>
                        <li>
                          <mat-list-item>
                            <mat-checkbox [checked]="allChecked" (change)="setAll($event.checked)">
                              <b>Επιλογή όλων</b>
                            </mat-checkbox>
                          </mat-list-item>
                          <mat-divider></mat-divider>
                          <mat-list-item role="listitem" *ngFor="let item of cleaningData">
                            <mat-checkbox [(ngModel)]="item.checked" name={{item.name}}>
                              {{item.name}}
                            </mat-checkbox>
                            <mat-divider></mat-divider>
                          </mat-list-item>
                        </li>
                      </ul>
                    </span>
                  </section>
                </mat-list>

                <div class="action-row">
                  <button mat-raised-button color="primary" (click)="onSaveCleaningData()">
                    <mat-icon>save</mat-icon> Αποθήκευση
                  </button>
                </div>
              </form>
            </div>
          </div>
        </mat-tab>

        <mat-tab label="Αρχεία καθαρισμού">
          <div class="tab-content">
            <app-cleaning-files></app-cleaning-files>
          </div>
        </mat-tab>

      </mat-tab-group>
    </mat-card-content>
  </mat-card>

</div>
