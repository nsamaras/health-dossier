<br>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8" >

  <ng-container matColumnDef="position">
    <th mat-header-cell *matHeaderCellDef> No </th>
    <td mat-cell *matCellDef="let element ; let i = index;"> {{i+1}} </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Όνομα αρχείου </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

   <ng-container matColumnDef="download">
    <th mat-header-cell *matHeaderCellDef> Download </th>       
    <td mat-cell *matCellDef="let element ; let i = index;">          
      <button mat-mini-fab aria-label="Example icon button with a delete icon" (click)="onDownload(i)">
        <mat-icon aria-hidden="false" aria-label="Example download icon">download</mat-icon>
      </button>
    </td>       
  </ng-container>

  <ng-container matColumnDef="delete">
    <th mat-header-cell *matHeaderCellDef> Διαγραφή </th>       
    <td mat-cell *matCellDef="let element ; let i = index;">          
      <button mat-mini-fab color="warn" aria-label="Example icon button with a delete icon" (click)="onDelete(i)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>       
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<mat-paginator [pageSize]="5"
               [pageSizeOptions]="[5, 10, 20]"
               showFirstLastButtons>
</mat-paginator>
