<div class="page-container">
  <div class="page-hero">
    <mat-icon class="hero-icon">warning_amber</mat-icon>
    <h1 class="hero-title">Αλλεργιογόνα</h1>
  </div>

  <mat-card class="description-card">
    <mat-card-content>
      <p class="description-text">{{ descriptionText }}</p>
    </mat-card-content>
  </mat-card>

  <mat-card class="content-card">
    <mat-card-content>

      <div class="toolbar-row">
        <mat-form-field appearance="outline" class="product-input">
          <mat-label>Προσθήκη προϊόντος στη λίστα</mat-label>
          <input matInput #newOptionInput>
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="addAllergenicProduct(newOptionInput.value)">
          <mat-icon>add</mat-icon> Προσθήκη
        </button>
        <span class="spacer"></span>
        <button mat-raised-button color="primary" (click)="accordion.openAll()">
          <mat-icon>expand_more</mat-icon> Ανάπτυξη Όλων
        </button>
        <button mat-raised-button color="primary" (click)="accordion.closeAll()">
          <mat-icon>expand_less</mat-icon> Σύμπτυξη Όλων
        </button>
        <button mat-raised-button color="primary" (click)="export()">
          <mat-icon>print</mat-icon> Εκτύπωση
        </button>
      </div>

      <mat-accordion class="example-headers-align" multi>
        <mat-expansion-panel *ngFor="let option of allergenicProducts" (opened)="panelOpened(option)">
          <mat-expansion-panel-header>
            <mat-panel-title>{{ option.productName }}</mat-panel-title>
            <mat-panel-description>
              {{ option.productName }}
              <mat-icon class="delete-icon" (click)="deleteProduct(option)">delete</mat-icon>
            </mat-panel-description>
          </mat-expansion-panel-header>

          <div class="table-wrapper">
            <table mat-table [dataSource]="option.allergenicData" class="allergenic-table mat-elevation-z2">

              <!-- Name Column -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Αλλεργιογόνο</th>
                <td mat-cell *matCellDef="let item">{{ item.name }}</td>
              </ng-container>

              <!-- Contains Column -->
              <ng-container matColumnDef="contains">
                <th mat-header-cell *matHeaderCellDef>
                  <mat-checkbox (change)="selectAllContains($event)">ΠΕΡΙΕΧΕΙ</mat-checkbox>
                </th>
                <td mat-cell *matCellDef="let item">
                  <mat-checkbox [(ngModel)]="item.checkedContains"
                    (change)="onCheckboxChange(item, 'contains')"></mat-checkbox>
                </td>
              </ng-container>

              <!-- Ingredients Column -->
              <ng-container matColumnDef="ingredients">
                <th mat-header-cell *matHeaderCellDef>
                  <mat-checkbox (change)="selectAllIngredients($event)">ΙΧΝΗ</mat-checkbox>
                </th>
                <td mat-cell *matCellDef="let item">
                  <mat-checkbox [(ngModel)]="item.checkedIngredients"
                    (change)="onCheckboxChange(item, 'ingredients')"></mat-checkbox>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumnsAllergenic"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumnsAllergenic;"></tr>
            </table>
          </div>

          <div class="action-row">
            <button mat-raised-button color="primary"
              (click)="onSaveAllerginicData(option.productName, option.allergenicData)">
              <mat-icon>save</mat-icon> Αποθήκευση
            </button>
          </div>

        </mat-expansion-panel>
      </mat-accordion>

    </mat-card-content>
  </mat-card>
</div>
